name: Format check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm ci
      - name: Check formatting
        run: npm run format:check
